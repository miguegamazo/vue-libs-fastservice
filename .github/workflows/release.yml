name: Build and Release vue-libs-fastservice

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node for GitHub Packages
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://npm.pkg.github.com"
          scope: "@miguegamazo"

      - name: Install dependencies
        run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Sync version from Git tag to package.json
        run: |
          TAG=${GITHUB_REF##*/}
          VERSION=${TAG#v}
          echo "📝 Version $VERSION"
          npm version "$VERSION" --no-git-tag-version

      - name: Type check
        run: npm run check

      - name: Build package
        run: npm run build

      - name: Verify type declarations exist
        run: test -f dist/index.d.ts

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Prepare release zip
        run: |
          mkdir release
          cp -r dist release/
          cp package.json release/
          cp README.md release/ || true
          cd release && zip -r ../vue-libs-fastservice.zip .

      - name: Upload ZIP to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: vue-libs-fastservice.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
